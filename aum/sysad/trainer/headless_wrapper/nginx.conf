user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # ───────────────────────────────
    # Upstream
    # ───────────────────────────────
    upstream wordpress {
        server 10.10.92.9:8080;   
    }

    upstream nextjs {
        server 10.10.92.9:3000;   
    }

    # ───────────────────────────────
    # Redirect HTTP → HTTPS
    # ───────────────────────────────
    server {
        listen 80;
        server_name wp.devlab.info.vn app.devlab.info.vn;
        return 301 https://$host$request_uri;
    }

    # ───────────────────────────────
    # WordPress — wp.devlab.info.vn
    # ───────────────────────────────
    server {
        listen 443 ssl;
        server_name wp.devlab.info.vn;

        ssl_certificate     /etc/letsencrypt/live/wp.devlab.info.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/wp.devlab.info.vn/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://wordpress;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ───────────────────────────────
    # Next.js — app.devlab.info.vn
    # ───────────────────────────────
    server {
        listen 443 ssl;
        server_name app.devlab.info.vn;

        ssl_certificate     /etc/letsencrypt/live/app.devlab.info.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/app.devlab.info.vn/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Static files Next.js
        location /_next/static/ {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, immutable";
        }

        # API routes
        location /api/ {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # App chính
        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}