services:
  wp.devlab.info.vn:
    container_name: wp.devlab.info.vn
    image: wordpress:6.5.4
    environment:
      WORDPRESS_DB_HOST: mysql
      WORDPRESS_DB_NAME: wordpress_db
      WORDPRESS_DB_USER: wpuser
      WORDPRESS_DB_PASSWORD: wp_strong_password
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/wp-content:/var/www/html/wp-content
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - backup.dhthainguyen.edu.vn
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  app.devlab.info.vn:
    build: ./backup.dhthainguyen.edu.vn
    container_name: app.devlab.info.vn
    environment:
      DB_HOST: mysql
      DB_NAME: app_db
      DB_USER: appuser
      DB_PASSWORD: app_strong_password
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - backup.dhthainguyen.edu.vn
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_strong_password
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wp_strong_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - backup.dhthainguyen.edu.vn
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_strong_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  backup.dhthainguyen.edu.vn:
    driver: bridge

volumes:
  wordpress_data:
  mysql_data: